# Obsidian Vault Sync Configuration
vault_path: /Users/ctoti/Obsidian/Obsidian_Work

mappings:
  reference:
    source: docs/guide-*.md
    destination: 10-Reference/
    frontmatter:
      tags: [claude-code, reference]
      fields: [status]

  research:
    source: outputs/reports/
    destination: 30-Reports/
    frontmatter:
      tags: [claude-code, research]
      fields: [topic, confidence, status]

  weekly:
    source: outputs/reports/weekly/
    destination: 30-Reports/weekly/
    frontmatter:
      tags: [claude-code, weekly]
      fields: [domain, period]

  goal:
    source: null  # Obsidian-only
    destination: 20-Goals/
    frontmatter:
      tags: [claude-code, goal]
      fields: [status]

  devlog:
    source: null  # Obsidian-only
    destination: 40-DevLog/
    frontmatter:
      tags: [claude-code, daily]
      fields: [phase]

naming:
  date_prefix: true
  format: "{YYYY-MM-DD}_{slug}.md"
  slug_style: lowercase-kebab-case
